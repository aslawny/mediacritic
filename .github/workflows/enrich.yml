name: Enrichissement catalogue

# ─── Déclencheurs ──────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 3 * * *'   # tous les jours à 3h UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode de collecte (laisser vide = cycle automatique)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - podcast
          - youtube
          - refresh

# ─── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write

# ─── Forcer Node.js 24 (Node 20 deprecated juin 2026) ─────────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─── Job principal ─────────────────────────────────────────────────────────────
jobs:
  enrich:
    name: 'Enrichissement — cycle 3 jours (podcast → youtube → refresh)'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # 1. Checkout de la branche gh-pages (contenu du site + scripts)
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
          fetch-depth: 1

      # 2. Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Pas de cache pip : aucun requirements.txt dans ce repo (évite le warning)

      # 3. Dépendances
      - name: Install dependencies
        run: pip install --quiet requests

      # 4. Détermination du mode — cycle : podcast → youtube → refresh → podcast …
      #    Le fichier .run_state dans gh-pages mémorise le dernier mode exécuté.
      - name: Determine run mode
        id: mode
        run: |
          MANUAL="${{ github.event.inputs.mode }}"
          if [ -n "$MANUAL" ] && [ "$MANUAL" != "auto" ]; then
            MODE="$MANUAL"
            echo "Source: manuel"
          elif [ -f "site/.run_state" ]; then
            LAST=$(cat site/.run_state | tr -d '[:space:]')
            echo "Dernier mode : $LAST"
            case "$LAST" in
              podcast)  MODE="youtube"  ;;
              youtube)  MODE="refresh"  ;;
              *)        MODE="podcast"  ;;   # refresh ou inconnu → podcast
            esac
          else
            MODE="podcast"
            echo ".run_state absent — démarrage du cycle par podcast"
          fi
          echo "Mode sélectionné : $MODE"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      # 5. Collecte — Jour 1 : ≥ 20 nouveaux podcasts (iTunes Top Charts + recherche)
      #              Jour 2 : ≥ 20 nouvelles chaînes YouTube (harvest + recherche API)
      #              Jour 3 : refresh notes + abonnés sur TOUTES les entrées existantes
      - name: Run collect_data.py
        working-directory: site
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          echo "=== Démarrage collect_data.py --mode $MODE ==="
          python scripts/collect_data.py \
            --mode "$MODE" \
            --youtube-key "${YOUTUBE_API_KEY:-}" \
            --spotify-id "${SPOTIFY_CLIENT_ID:-}" \
            --spotify-secret "${SPOTIFY_CLIENT_SECRET:-}"

      # 6. Régénération des fiches HTML individuelles
      - name: Generate fiches HTML
        working-directory: site
        run: |
          if [ -f "scripts/generate_fiches.py" ]; then
            echo "=== Génération des fiches HTML ==="
            python scripts/generate_fiches.py
          else
            echo "generate_fiches.py absent — ignoré"
          fi

      # 7. Vérification et mise à jour automatique du hash SRI de Fuse.js
      #    Si jsDelivr publie une nouvelle version de fuse.js@7, le hash est
      #    recalculé et index.html + catalogue.html sont mis à jour automatiquement.
      - name: Check and update Fuse.js SRI hash
        working-directory: site
        run: |
          python3 - <<'PYEOF'
          import hashlib, base64, urllib.request, re
          from pathlib import Path

          url = "https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"
          print(f"Téléchargement de {url}...")
          try:
              with urllib.request.urlopen(url, timeout=15) as r:
                  content = r.read()
          except Exception as e:
              print(f"Erreur téléchargement : {e}")
              exit(0)

          new_hash = "sha384-" + base64.b64encode(hashlib.sha384(content).digest()).decode()
          version_match = re.search(rb'Fuse\.js v(\d+\.\d+\.\d+)', content)
          version = version_match.group(1).decode() if version_match else "7"
          print(f"Fuse.js version détectée : {version}")
          print(f"Nouveau hash             : {new_hash}")

          pattern = re.compile(
              r'src="https://cdn\.jsdelivr\.net/npm/fuse\.js@[^"]+/dist/fuse\.min\.js"\s+integrity="[^"]+"'
          )
          replacement = (
              f'src="https://cdn.jsdelivr.net/npm/fuse.js@{version}/dist/fuse.min.js" '
              f'integrity="{new_hash}"'
          )

          for fname in ["index.html", "catalogue.html"]:
              path = Path(fname)
              if not path.exists():
                  print(f"  {fname} introuvable — ignoré")
                  continue
              text = path.read_text(encoding="utf-8")
              new_text = pattern.sub(replacement, text)
              if new_text != text:
                  path.write_text(new_text, encoding="utf-8")
                  print(f"  ✓ {fname} mis à jour (hash + version)")
              else:
                  print(f"  = {fname} déjà à jour")
          PYEOF

      # 8. Bilan : nombre de fichiers ajoutés / modifiés
      - name: Count changes
        working-directory: site
        run: |
          NEW=$(git diff --name-only --diff-filter=A | grep "^data/content/" | wc -l)
          UPD=$(git diff --name-only --diff-filter=M | grep "^data/content/" | wc -l)
          echo "Nouvelles fiches  : $NEW"
          echo "Fiches mises à jour : $UPD"
          echo "new_count=$NEW" >> "$GITHUB_ENV"
          echo "upd_count=$UPD" >> "$GITHUB_ENV"

      # 8. Mise à jour de .run_state
      - name: Update .run_state
        run: echo "${{ steps.mode.outputs.mode }}" > site/.run_state

      # 9. Commit + push vers gh-pages (uniquement s'il y a des changements)
      - name: Commit and push
        working-directory: site
        run: |
          git config user.name  "MediaCritic Bot"
          git config user.email "bot@mediacritic.fr"
          git add -A
          if git diff --cached --quiet; then
            echo "Aucun changement — pas de commit."
          else
            MSG="auto: enrichissement ${{ steps.mode.outputs.mode }} — $(date -u +%Y-%m-%d)"
            git commit -m "$MSG"
            git push origin gh-pages
            echo "✅ Commit effectué : $MSG"
          fi
